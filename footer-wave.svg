<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none" width="100%" height="80">
  <defs>
    <style>
      .wave1 {
        fill: #88c0d0;
        fill-opacity: 0.3;
      }
      .wave2 {
        fill: #81a1c1;
        fill-opacity: 0.5;
      }
      .wave3 {
        fill: #5e81ac;
        fill-opacity: 0.8;
      }
    </style>
  </defs>
  <g>
    <!-- Wave 1 (Back, slowest) -->
    <path class="wave1" d="M 0,60 Q 150,40 300,60 T 600,60 T 900,60 T 1200,60 T 1500,60 T 1800,60 T 2100,60 T 2400,60 V 120 H 0 Z">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-1200,0" dur="18s" repeatCount="indefinite" />
    </path>
    <!-- Wave 2 (Middle, medium speed) -->
    <path class="wave2" d="M 0,50 Q 150,30 300,50 T 600,50 T 900,50 T 1200,50 T 1500,50 T 1800,50 T 2100,50 T 2400,50 V 120 H 0 Z">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-1200,0" dur="12s" repeatCount="indefinite" />
    </path>
    <!-- Wave 3 (Front, fastest) -->
    <path class="wave3" d="M 0,40 Q 150,20 300,40 T 600,40 T 900,40 T 1200,40 T 1500,40 T 1800,40 T 2100,40 T 2400,40 V 120 H 0 Z">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-1200,0" dur="8s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
